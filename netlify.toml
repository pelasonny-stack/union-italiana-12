[build]
  command = "pnpm build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

[[redirects]]
  from = "/"
  to = "/es/"
  status = 302
  force = false

# Netlify Identity + Git Gateway endpoints (auto-handled, no config necesaria
# pero documentamos por claridad)
# /.netlify/identity/* → Identity API
# /.netlify/git/github/* → Git Gateway proxy a GitHub API

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data:; img-src 'self' data: https:; connect-src 'self' https://api.github.com https://identity.netlify.com https://*.netlify.app https://api.netlify.com"
